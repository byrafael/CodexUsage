<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">Codex Usage Monitor icon</title>
  <desc id="desc">A circular usage gauge wrapping live activity bars on a green rounded square.</desc>
  <defs>
    <linearGradient id="bg" x1="10" y1="8" x2="54" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b2d23" />
      <stop offset="0.55" stop-color="#0f5f3a" />
      <stop offset="1" stop-color="#1a9e59" />
    </linearGradient>
    <linearGradient id="bars" x1="26" y1="24" x2="46" y2="46" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#dfffe9" />
      <stop offset="1" stop-color="#8cf1b7" />
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="translate(47 17) rotate(135) scale(20)" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#c4ffd8" stop-opacity="0.95" />
      <stop offset="1" stop-color="#c4ffd8" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="64" height="64" rx="18" fill="url(#bg)" />
  <rect x="5" y="5" width="54" height="54" rx="14" fill="none" stroke="#d7ffe4" stroke-opacity="0.12" />
  <circle cx="47" cy="17" r="20" fill="url(#glow)" />

  <path
    d="M47 17A18 18 0 1 0 47 47"
    fill="none"
    stroke="#f5fff8"
    stroke-width="8"
    stroke-linecap="round"
    stroke-opacity="0.96"
  />

  <path
    d="M23 44H47"
    fill="none"
    stroke="#d7ffe4"
    stroke-width="2.25"
    stroke-linecap="round"
    stroke-opacity="0.55"
  />

  <rect x="25" y="33" width="5.5" height="11" rx="2.75" fill="url(#bars)" />
  <rect x="34.25" y="27" width="5.5" height="17" rx="2.75" fill="url(#bars)" />
  <rect x="43.5" y="21" width="5.5" height="23" rx="2.75" fill="url(#bars)" />

  <circle cx="47" cy="17" r="4.25" fill="#9dffbf" />
  <circle cx="47" cy="17" r="1.5" fill="#0d3c2c" />
</svg>
