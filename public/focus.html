<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Codex Counter</title>
    <link rel="stylesheet" href="/focus.css" />
  </head>
  <body>
    <main class="focus-shell">
      <article class="focus-card">
        <h1 id="focus-title">Codex Model</h1>
        <div id="token-value" class="token-value">0</div>
        <div id="cost-value" class="cost-value">$0.00</div>
        <p id="reset-value" class="reset-value">Reset in: --</p>
        <p id="usage-value" class="usage-value">Used: --</p>
        <p id="status-value" class="status-value">Loading...</p>
      </article>
    </main>
    <script src="/focus.js" type="module"></script>
  </body>
</html>
